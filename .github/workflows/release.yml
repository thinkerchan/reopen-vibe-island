name: Release

# Fork-flavored release workflow:
# - No Apple Developer ID signing (the fork has no APPLE_* secrets)
# - No notarization
# - No Sparkle EdDSA signing (Info.plist has no SUPublicEDKey)
# - No Homebrew tap update
# - No contributors-image cache PR
#
# Trigger by pushing a `v*` tag to `main`. CI builds the app, packages
# the DMG, and publishes a draft GitHub Release with the DMG and ZIP
# attached.  End users will see Gatekeeper warnings on first launch
# (unsigned bundle) — the release notes spell out the workaround.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          brew install create-dmg
          pip3 install --break-system-packages Pillow

      - name: Build and package (unsigned)
        env:
          OPEN_ISLAND_APP_NAME: "ReOpenIsland"
          OPEN_ISLAND_BUNDLE_ID: "com.thinkerchan.reopenisland"
          OPEN_ISLAND_VERSION: ${{ steps.version.outputs.version }}
          OPEN_ISLAND_BUILD_NUMBER: ${{ github.run_number }}
          OPEN_ISLAND_UNIVERSAL: "true"
        run: zsh scripts/package-app.sh

      - name: Verify artifacts
        run: |
          test -f "output/package/ReOpenIsland.zip"
          test -f "output/package/ReOpenIsland.dmg"
          ls -lh output/package/

      - name: Verify bundle structure
        run: |
          bundle="output/package/ReOpenIsland.app"
          echo "--- Bundle contents ---"
          find "$bundle" -maxdepth 3 -type f | sort

          # Required files (Swift product names stay OpenIsland*)
          for f in \
            "Contents/MacOS/OpenIslandApp" \
            "Contents/Helpers/OpenIslandHooks" \
            "Contents/Helpers/OpenIslandSetup" \
            "Contents/Resources/OpenIsland.icns" \
            "Contents/Resources/OpenIsland_OpenIslandApp.bundle" \
          ; do
            if [[ ! -e "$bundle/$f" ]]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

          echo "Bundle structure OK"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ReOpenIsland $GITHUB_REF_NAME" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')" \
            --draft \
            "output/package/ReOpenIsland.dmg#ReOpenIsland.dmg (macOS, Universal, unsigned)" \
            "output/package/ReOpenIsland.zip#ReOpenIsland.zip (macOS, Universal, unsigned)"

      - name: Append install instructions to release notes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          existing="$(gh release view "$GITHUB_REF_NAME" --json body -q .body)"
          gh release edit "$GITHUB_REF_NAME" --notes "$(cat <<EOF
          ${existing}

          ---

          ## Installation

          1. Download **ReOpenIsland.dmg**, open it, drag **ReOpenIsland** to **Applications**.
          2. First launch: macOS will block the app because it isn't signed
             with an Apple Developer ID. Either:
             - **Right-click → Open → Open** in the Gatekeeper dialog, or
             - run \`xattr -dr com.apple.quarantine "/Applications/ReOpenIsland.app"\` once.
          3. Requires **macOS 14+** (Apple Silicon and Intel).

          > This is an unsigned community fork build — Apple Developer ID
          > signing and notarization are intentionally skipped. Re-enable them
          > in \`.github/workflows/release.yml\` once you set up signing secrets.
          EOF
          )"
