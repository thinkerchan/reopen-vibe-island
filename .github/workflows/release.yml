name: Release

# Fork-flavored release workflow:
# - No Apple Developer ID signing (the fork has no APPLE_* secrets)
# - No notarization
# - No Sparkle EdDSA signing (Info.plist has no SUPublicEDKey)
# - No Homebrew tap update
# - No contributors-image cache PR
#
# Trigger by pushing a `v*` tag to `main`. CI builds the app, packages
# the DMG, and publishes a draft GitHub Release with the DMG and ZIP
# attached.  End users will see Gatekeeper warnings on first launch
# (unsigned bundle) — the release notes spell out the workaround.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          brew install create-dmg
          pip3 install --break-system-packages Pillow

      - name: Build and package (unsigned)
        env:
          OPEN_ISLAND_APP_NAME: "ReOpenIsland"
          OPEN_ISLAND_BUNDLE_ID: "com.thinkerchan.reopenisland"
          OPEN_ISLAND_VERSION: ${{ steps.version.outputs.version }}
          OPEN_ISLAND_BUILD_NUMBER: ${{ github.run_number }}
          OPEN_ISLAND_UNIVERSAL: "true"
        run: zsh scripts/package-app.sh

      - name: Verify artifacts
        run: |
          test -f "output/package/ReOpenIsland.zip"
          test -f "output/package/ReOpenIsland.dmg"
          ls -lh output/package/

      - name: Verify bundle structure
        run: |
          bundle="output/package/ReOpenIsland.app"
          echo "--- Bundle contents ---"
          find "$bundle" -maxdepth 3 -type f | sort

          # Required files (Swift product names stay OpenIsland*)
          for f in \
            "Contents/MacOS/OpenIslandApp" \
            "Contents/Helpers/OpenIslandHooks" \
            "Contents/Helpers/OpenIslandSetup" \
            "Contents/Resources/OpenIsland.icns" \
            "Contents/Resources/OpenIsland_OpenIslandApp.bundle" \
          ; do
            if [[ ! -e "$bundle/$f" ]]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

          echo "Bundle structure OK"

      - name: Compose release notes (auto changelog + install steps)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          # Step 1: ask GitHub to auto-generate the changelog body for
          # this tag (PRs / commits since previous tag). Using the JSON
          # endpoint avoids needing to first create the release with
          # `--generate-notes` and then read it back through a fragile
          # heredoc — the previous flow blew up because auto-generated
          # markdown frequently contains backticks / `$` that re-evaluate
          # in unquoted heredocs.
          previous_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
          if [[ -n "$previous_tag" ]]; then
            previous_arg='-f previous_tag_name="'"$previous_tag"'"'
          else
            previous_arg=''
          fi
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            ${previous_arg} \
            -q '.body' > /tmp/auto_notes.md || echo "" > /tmp/auto_notes.md

          # Step 2: append the literal install-steps block from the
          # repo. Earlier we tried inlining the markdown via heredoc but
          # YAML reads `---` at column 0 inside the workflow file as a
          # document separator, which exploded the entire workflow at
          # parse time (zero jobs, zero useful diagnostics). Sourcing
          # from a separate file dodges the YAML/heredoc indentation
          # clash entirely.
          cat /tmp/auto_notes.md .github/release-install-notes.md \
            > /tmp/release_notes.md

          echo "--- Composed notes ---"
          head -40 /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ReOpenIsland $GITHUB_REF_NAME" \
            --notes-file /tmp/release_notes.md \
            --draft \
            "output/package/ReOpenIsland.dmg#ReOpenIsland.dmg (macOS, Universal, unsigned)" \
            "output/package/ReOpenIsland.zip#ReOpenIsland.zip (macOS, Universal, unsigned)"
